<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGM College Login</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: 'Google Sans', Arial, sans-serif; background: #08783f; color: #163225; }
        .card { width: min(420px, calc(100% - 32px)); background: #fff; border-radius: 14px; border: 4px solid #07552f; box-shadow: 0 24px 48px rgba(0,0,0,.22); overflow: hidden; }
        .head { background: #08783f; color: #fff; padding: 26px; text-align: center; }
        h1 { margin: 0 0 6px; font-size: 26px; }
        p { margin: 0; color: #d8f2e4; }
        form { padding: 26px; }
        label { display: block; font-weight: 800; margin: 0 0 7px; }
        input { width: 100%; height: 44px; border: 1px solid #cfd8d3; border-radius: 7px; padding: 0 12px; margin-bottom: 16px; font: inherit; }
        button { width: 100%; height: 44px; border: 0; border-radius: 7px; background: #08783f; color: #fff; font-weight: 900; cursor: pointer; }
        .error { margin: 0 26px 22px; padding: 12px; border-radius: 7px; background: #ffe7e7; color: #8a1e1e; text-align: center; font-weight: 700; }
    </style>
</head>
<body>
    <main class="card">
        <div class="head">
            <h1>MGM College</h1>
            <p>Result Management System</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required autofocus>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required>
            <button type="submit">Sign in</button>
        </form>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
    </main>
</body>
</html>
