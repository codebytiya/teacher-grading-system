{% extends "admin/base.html" %}

{% block title %}MGM College Admin{% endblock %}

{% block branding %}
<div class="college-brand">
    <strong>MGM College</strong>
</div>
{% endblock %}

{% block extrastyle %}{{ block.super }}
<style>
    :root {
        --primary-green: #2d7a2d;
        --light-green: #4caf50;
        --pale-green: #e8f5e8;
        --dark-green: #1b5e20;
        --white: #ffffff;
        --light-gray: #f8f9fa;
        --text-dark: #2c3e50;
        --text-muted: #6c757d;
        --border-color: #dee2e6;
    }

    html, body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, var(--pale-green) 0%, var(--white) 100%);
        color: var(--text-dark);
        margin: 0;
        padding: 0;
        min-height: 100vh;
    }

    body {
        padding: 2rem;
        min-height: 100vh;
    }

    #container {
        max-width: 1400px;
        margin: 0 auto;
        background: var(--white);
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(45, 122, 45, 0.15);
        border: 2px solid var(--light-green);
        overflow: visible;
        min-height: auto;
    }

    #header {
        background: linear-gradient(90deg, var(--primary-green), var(--light-green));
        color: var(--white);
        padding: 1.5rem 2rem;
        border-bottom: 3px solid var(--dark-green);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .college-brand {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .college-brand strong {
        color: var(--white);
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.02em;
    }

    .college-brand::before {
        content: "🎓";
        font-size: 1.8rem;
    }

    #user-tools {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    #user-tools a,
    #user-tools button {
        color: var(--white);
        font-weight: 600;
        text-decoration: none;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        transition: all 0.3s ease;
    }

    #user-tools a:hover,
    #user-tools button:hover {
        background: rgba(255, 255, 255, 0.1);
    }

    #logout-form button {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: var(--white);
        padding: 0.5rem 1rem;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    #logout-form button:hover {
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.5);
    }

    div.breadcrumbs {
        background: var(--pale-green);
        color: var(--dark-green);
        padding: 1rem 2rem;
        font-weight: 600;
        border-bottom: 1px solid var(--light-green);
    }

    div.breadcrumbs a {
        color: var(--primary-green);
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s ease;
    }

    div.breadcrumbs a:hover {
        color: var(--dark-green);
    }

    .main {
        display: flex;
        min-height: auto;
    }

    #nav-sidebar {
        width: 280px;
        background: var(--white);
        border-right: 1px solid var(--border-color);
        padding: 1.5rem;
    }

    #nav-sidebar .module {
        margin-bottom: 2rem;
        border: 0;
        box-shadow: none;
        background: transparent;
    }

    #nav-sidebar h2,
    #nav-sidebar caption {
        color: var(--primary-green);
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 1rem;
        padding: 0;
        border: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    #nav-sidebar table {
        width: 100%;
        border-collapse: collapse;
    }

    #nav-sidebar th,
    #nav-sidebar td {
        border: 0;
        padding: 0;
    }

    #nav-sidebar a {
        display: block;
        padding: 0.75rem 1rem;
        margin-bottom: 0.5rem;
        border-radius: 8px;
        color: var(--text-dark);
        font-weight: 500;
        text-decoration: none;
        transition: all 0.3s ease;
        border: 1px solid transparent;
    }

    #nav-sidebar .current-model a,
    #nav-sidebar a:hover {
        background: var(--pale-green);
        color: var(--primary-green);
        border-color: var(--light-green);
        transform: translateX(5px);
    }

    #nav-sidebar .addlink {
        color: var(--light-green);
        font-weight: 700;
        background: rgba(76, 175, 80, 0.1);
        border-color: var(--light-green);
    }

    #nav-sidebar .addlink:hover {
        background: var(--light-green);
        color: var(--white);
    }

    #content {
        flex: 1;
        padding: 2rem;
        background: var(--light-gray);
    }

    #content h1 {
        color: var(--primary-green);
        font-size: 1.8rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .module,
    .inline-group,
    #changelist,
    .form-row,
    fieldset.module {
        background: var(--white);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        margin-bottom: 1.5rem;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        overflow: hidden;
    }

    .module h2,
    .module caption,
    .inline-group h2,
    fieldset.module h2 {
        background: linear-gradient(90deg, var(--primary-green), var(--light-green));
        color: var(--white);
        padding: 1rem 1.5rem;
        font-weight: 600;
        border: none;
        margin: 0;
    }

    #changelist-filter {
        background: var(--white);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 1.5rem;
        margin-left: 1.5rem;
    }

    #toolbar,
    #changelist-search {
        background: var(--white);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
    }

    #changelist table thead th,
    .module table thead th {
        background: var(--primary-green);
        color: var(--white);
        padding: 1rem;
        font-weight: 600;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border: none;
    }

    #changelist table tbody td,
    #changelist table tbody th,
    .module table td,
    .module table th {
        padding: 1rem;
        border-bottom: 1px solid var(--border-color);
        transition: background 0.3s ease;
    }

    #changelist table tbody tr:hover td,
    #changelist table tbody tr:hover th {
        background: var(--pale-green);
    }

    .object-tools a,
    .object-tools button,
    input[type=submit],
    button,
    .button,
    input[type=button],
    .submit-row input {
        background: var(--primary-green);
        color: var(--white);
        border: none;
        border-radius: 8px;
        padding: 0.75rem 1.5rem;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 2px 4px rgba(45, 122, 45, 0.2);
    }

    .object-tools a:hover,
    input[type=submit]:hover,
    button:hover,
    .button:hover {
        background: var(--dark-green);
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(45, 122, 45, 0.3);
    }

    .object-tools .addlink {
        background: var(--light-green);
    }

    input,
    select,
    textarea,
    .vTextField {
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 0.75rem;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        transition: all 0.3s ease;
    }

    input:focus,
    select:focus,
    textarea:focus,
    .vTextField:focus {
        outline: none;
        border-color: var(--light-green);
        box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
    }

    .submit-row {
        background: var(--white);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 1.5rem;
        margin-top: 1rem;
    }

    #content-related {
        background: var(--white);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 1.5rem;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }

    .paginator {
        background: var(--white);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 1rem;
        margin-top: 1rem;
    }

    .paginator a {
        color: var(--primary-green);
        text-decoration: none;
        font-weight: 600;
        padding: 0.5rem 0.75rem;
        border-radius: 4px;
        transition: all 0.3s ease;
    }

    .paginator a:hover {
        background: var(--pale-green);
    }

    .paginator .this-page {
        background: var(--primary-green);
        color: var(--white);
        padding: 0.5rem 0.75rem;
        border-radius: 4px;
    }

    .messagelist .success {
        background: var(--pale-green);
        color: var(--dark-green);
        border: 1px solid var(--light-green);
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
    }

    .messagelist .warning {
        background: #fff3cd;
        color: #856404;
        border: 1px solid #ffeaa7;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
    }

    .messagelist .error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
    }

    @media (max-width: 1024px) {
        body {
            padding: 1rem;
        }

        #container {
            border-radius: 8px;
        }

        #header {
            flex-direction: column;
            gap: 1rem;
            text-align: center;
        }

        .main {
            flex-direction: column;
        }

        #nav-sidebar {
            width: 100%;
            border-right: none;
            border-bottom: 1px solid var(--border-color);
        }

        #content {
            padding: 1rem;
        }
    }
</style>
{% endblock %}
