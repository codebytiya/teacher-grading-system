{% extends "admin/base.html" %}

{% block title %}ICBM Admin{% endblock %}

{% block branding %}
<div class="college-brand">
    <span class="brand-mark">I</span>
    <span>
        <strong>ICBM</strong>
        <small>International College of Business Management</small>
    </span>
</div>
{% endblock %}

{% block extrastyle %}{{ block.super }}
<style>
    :root {
        --sidebar: #1e2a3a;
        --sidebar-hover: #334155;
        --sidebar-text: #e2e8f0;
        --body-bg: #f8fafc;
        --card: #ffffff;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --success: #10b981;
        --warning-bg: #fef3c7;
        --warning-border: #f59e0b;
        --heading: #0f172a;
        --body-text: #334155;
        --pending: #cbd5e1;
        --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
    }

    html, body {
        height: 100%;
        margin: 0;
        font-family: 'Google Sans', Arial, sans-serif;
        background: var(--body-bg);
        color: var(--body-text);
    }

    body {
        overflow-y: auto;
    }

    #container {
        min-height: 100vh;
        background: var(--body-bg);
    }

    #header {
        background: var(--card);
        color: var(--heading);
        border-bottom: 1px solid #e2e8f0;
        box-shadow: var(--shadow);
        min-height: 72px;
        padding: 0 28px;
    }

    .college-brand {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .brand-mark {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border-radius: 12px;
        background: var(--primary);
        color: white;
        font-weight: 900;
    }

    .college-brand strong {
        display: block;
        color: var(--heading);
        font-size: 22px;
        font-weight: 900;
    }

    .college-brand small {
        display: block;
        color: #64748b;
        font-size: 11px;
        font-weight: 700;
    }

    #user-tools, #user-tools a, #logout-form button {
        color: var(--body-text);
        font-weight: 800;
    }

    #logout-form button {
        background: transparent;
        border: 0;
    }

    div.breadcrumbs {
        background: transparent;
        color: #64748b;
        padding: 18px 28px 0;
        border-left: 280px solid transparent;
        font-weight: 800;
    }

    div.breadcrumbs a {
        color: var(--primary);
    }

    #nav-sidebar {
        width: 280px;
        background: var(--sidebar);
        color: var(--sidebar-text);
        padding: 24px 16px;
        border-right: 0;
    }

    #nav-sidebar .module {
        background: transparent;
        border: 0;
        box-shadow: none;
    }

    #nav-sidebar h2,
    #nav-sidebar caption {
        background: transparent;
        color: var(--sidebar-text);
        padding: 0 12px 18px;
        font-size: 20px;
        font-weight: 900;
    }

    #nav-sidebar table, #nav-sidebar tbody, #nav-sidebar tr, #nav-sidebar th, #nav-sidebar td {
        display: block;
        width: 100%;
        border: 0;
        padding: 0;
    }

    #nav-sidebar a {
        display: block;
        min-height: 42px;
        margin: 4px 0;
        padding: 12px 14px;
        border-radius: 10px;
        color: var(--sidebar-text);
        text-decoration: none;
        font-weight: 800;
    }

    #nav-sidebar a:hover,
    #nav-sidebar .current-model a {
        background: var(--sidebar-hover);
        color: white;
    }

    #nav-sidebar .addlink {
        color: white;
        background: rgba(59, 130, 246, .25);
    }

    #content {
        padding: 28px;
        background: var(--body-bg);
        overflow-y: auto;
    }

    #content h1 {
        color: var(--heading);
        font-size: 30px;
        font-weight: 900;
        margin: 0 0 22px;
    }

    .module, .inline-group, #changelist, fieldset.module, .submit-row, #content-related {
        background: var(--card);
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: var(--shadow);
        overflow: hidden;
    }

    .module h2, .module caption, .inline-group h2, fieldset.module h2 {
        background: var(--card);
        color: var(--heading);
        border-bottom: 1px solid #e2e8f0;
        padding: 16px 20px;
        font-weight: 900;
    }

    #changelist table thead th, .module table thead th {
        background: #f1f5f9;
        color: var(--body-text);
        border-bottom: 1px solid #e2e8f0;
        font-weight: 900;
    }

    #changelist table tbody td, #changelist table tbody th, .module table td, .module table th {
        padding: 13px 16px;
        border-bottom: 1px solid #e2e8f0;
    }

    input, select, textarea, .vTextField {
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 10px 12px;
        font-family: 'Google Sans', Arial, sans-serif;
    }

    .object-tools a, .object-tools button, input[type=submit], button, .button, input[type=button], .submit-row input {
        background: var(--primary);
        color: white;
        border: 0;
        border-radius: 10px;
        font-weight: 900;
    }

    .object-tools a:hover, input[type=submit]:hover, button:hover, .button:hover {
        background: var(--primary-hover);
    }

    @media (max-width: 900px) {
        div.breadcrumbs { border-left: 0; padding: 16px; }
        #nav-sidebar { width: 100%; }
        #content { padding: 18px; }
    }
</style>
{% endblock %}
